services:
  nginx:
    image: nginx:alpine
    container_name: play-console-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - play-console-network

  certbot:
    image: certbot/certbot
    container_name: play-console-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - play-console-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: play-console-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
      - backend-service-accounts:/app/service_accounts
      - backend-db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - play-console-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: play-console-frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=
      - VITE_GROQ_API_KEY=${VITE_GROQ_API_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - play-console-network

volumes:
  backend-uploads:
  backend-service-accounts:
  backend-db:

networks:
  play-console-network:
    driver: bridge
